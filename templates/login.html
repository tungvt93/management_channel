<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Channel Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-shell">
        <div class="login-card card">
            <h1 class="login-title">Channel Manager</h1>
            <p class="login-sub">Đăng nhập để vào bảng điều khiển</p>
            {% if error %}
            <p class="login-error">Sai tên đăng nhập hoặc mật khẩu.</p>
            {% endif %}
            <form method="post" action="/login" class="login-form">
                <label class="login-label" for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>

                <label class="login-label" for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>

                <button type="submit" class="login-submit">Đăng nhập</button>
            </form>
        </div>
    </div>
</body>
</html>
