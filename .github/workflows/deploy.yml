name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (docker compose up -d --build)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd /root/management_channel

            git fetch --all --prune
            git reset --hard origin/main
   

            CALLBACK_BASE_URL="${{ secrets.CALLBACK_BASE_URL || vars.CALLBACK_BASE_URL }}" docker compose up -d --build
